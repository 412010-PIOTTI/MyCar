server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Soporte para Angular routing (HTML5 pushState)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
