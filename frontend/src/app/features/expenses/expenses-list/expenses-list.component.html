<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Gastos</h1>
    <button class="btn-primary">+ Nuevo gasto</button>
  </div>

  <div *ngIf="expenses.length === 0" class="card text-center text-gray-500">
    No hay gastos registrados.
  </div>

  <div class="space-y-3">
    <div *ngFor="let expense of expenses" class="card flex items-center justify-between">
      <div>
        <p class="font-medium text-gray-900">{{ expense.description }}</p>
        <p class="text-sm text-gray-500">{{ expense.date | date:'dd/MM/yyyy' }} · {{ expense.vehicle }}</p>
      </div>
      <span class="font-semibold text-gray-900">${{ expense.amount }}</span>
    </div>
  </div>
</div>
