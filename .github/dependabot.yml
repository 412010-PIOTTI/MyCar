# ============================================================
# DEPENDABOT — Actualizaciones automáticas de dependencias
# Crea PRs automáticos cuando hay nuevas versiones disponibles
# ============================================================
version: 2

updates:
  # ── Maven (Backend) ────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignorar major versions de Spring Boot (cambios breaking)
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types: ["version-update:semver-major"]

  # ── npm (Frontend) ─────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignorar major versions de Angular (migraciones manuales)
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
