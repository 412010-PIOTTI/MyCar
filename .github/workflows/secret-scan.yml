# ============================================================
# SECRET SCAN — Gitleaks
# Corre primero en todos los eventos. Si encuentra claves
# expuestas en el historial, BLOQUEA el resto del pipeline.
# ============================================================
name: 🔍 Secret Scan

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
      - 'bugfix/**'
      - 'support/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  gitleaks:
    name: Gitleaks — detectar secretos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # IMPORTANTE: escanear TODO el historial, no solo el último commit

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Solo si usás Gitleaks Pro
