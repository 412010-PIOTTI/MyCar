name: CI Frontend - Complete Tests

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches:
      - 'develop'
      - 'main'
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    name: 🎨 Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build production
        run: cd frontend && npm run build

      - name: Run tests
        run: cd frontend && npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage 2>&1 || true

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 30

      - name: 📈 Comment on PR
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## 🚀 Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "frontend/dist" ]; then
            SIZE=$(du -sh frontend/dist | cut -f1)
            echo "✅ Build successful - Size: **$SIZE**" >> $GITHUB_STEP_SUMMARY
          fi
