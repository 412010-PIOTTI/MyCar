name: CI - Feature Branches (Quick Validation)

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - 'develop'    # ✅ ARREGLADO: PRs van a develop, no main

jobs:
  validate-backend:
    name: 🔨 Quick Backend Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'backend/pom.xml'

      - name: Grant execute permission for mvnw
        run: chmod +x ./backend/mvnw

      - name: Compile Backend (fast check)
        run: cd backend && ./mvnw clean compile --no-transfer-progress -q

  validate-frontend:
    name: 🎨 Quick Frontend Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend (fast check)
        run: cd frontend && npm run build 2>&1 || true
