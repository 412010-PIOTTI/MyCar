name: CI Backend - Complete Tests

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches:
      - 'develop'
      - 'main'
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: 🔨 Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'backend/pom.xml'

      - name: Grant execute permission for mvnw
        run: chmod +x ./backend/mvnw

      - name: Build and run tests with coverage
        run: cd backend && ./mvnw clean verify -DskipITs=false --no-transfer-progress

      - name: 📊 Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 30

      - name: 📈 Comment Coverage on PR
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "## 🚀 Backend CI Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "backend/target/site/jacoco" ]; then
            echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY
            echo "📊 Coverage report available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
